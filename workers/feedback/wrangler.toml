name = "tuga-feedback"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom route (configure after domain DNS is on Cloudflare)
# routes = [
#   { pattern = "miktuga.ru/api/feedback", custom_domain = false, zone_name = "miktuga.ru" }
# ]

# D1 binding — create via: wrangler d1 create tuga-feedback
[[d1_databases]]
binding = "DB"
database_name = "tuga-feedback"
database_id = "REPLACE_WITH_D1_ID_AFTER_CREATE"

# KV binding — create via: wrangler kv namespace create tuga-feedback-rate-limit
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_ID_AFTER_CREATE"

# Set secrets via: wrangler secret put TELEGRAM_BOT_TOKEN
#                  wrangler secret put TELEGRAM_CHAT_ID
# (do NOT commit values here)

[observability]
enabled = true
