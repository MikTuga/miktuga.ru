<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<title>Tuga ecosystem — miktuga.ru</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
<link rel="canonical" href="https://miktuga.ru/" />
<link rel="alternate" hreflang="ru" href="https://miktuga.ru/ru/" />
<link rel="alternate" hreflang="en" href="https://miktuga.ru/en/" />
<link rel="alternate" hreflang="x-default" href="https://miktuga.ru/en/" />
<meta http-equiv="refresh" content="0; url=/en/" />
<script>
  // Redirect based on browser language: ru/uk/by → /ru/, остальные → /en/
  (function () {
    var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2).toLowerCase();
    var ruLikely = ['ru', 'uk', 'be', 'kk'].indexOf(lang) >= 0;
    location.replace(ruLikely ? '/ru/' : '/en/');
  })();
</script>
<style>body{font-family:system-ui,sans-serif;background:#0B0F14;color:#B0BEC5;text-align:center;padding:80px 20px;margin:0}</style>
</head>
<body>
  <p>Redirecting to <a href="/en/" style="color:#26A69A">English</a> · <a href="/ru/" style="color:#26A69A">Русский</a></p>
</body>
